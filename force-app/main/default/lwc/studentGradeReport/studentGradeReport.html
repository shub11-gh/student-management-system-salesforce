<!-- studentGradeReport.html -->
<template>
    <lightning-card title="Grade Report" icon-name="standard:education">

        <template if:true={isLoading}>
            <div class="slds-align_absolute-center slds-p-around_large">
                <lightning-spinner alternative-text="Loading grades..."></lightning-spinner>
            </div>
        </template>

        <template if:true={hasError}>
            <div class="app-error">{errorMessage}</div>
        </template>

        <template if:true={isEmpty}>
            <div class="app-empty">No assessment scores found for this student.</div>
        </template>

        <template if:true={hasData}>
            <div class="slds-p-horizontal_medium slds-p-bottom_medium">

                <!-- CGPA Banner -->
                <div class="app-cgpa-banner">
                    <div>
                        <div class="app-cgpa-label">Overall CGPA</div>
                        <div class="app-cgpa-value">{cgpa}</div>
                        <div class="app-cgpa-label">out of 10.00</div>
                    </div>
                </div>

                <!-- One card per course -->
                <template for:each={courseGrades} for:item="course">
                    <div key={course.courseName} class="app-card">

                        <!-- Dark Header -->
                        <div class="app-card-header">
                            <div class="app-card-title">{course.courseName}</div>
                            <div class="app-card-subtitle">
                                Section: {course.sectionCode} &nbsp;|&nbsp; {course.semester}
                            </div>
                            <div class="course-avg-row">
                                <span class="course-avg-label">Course Average</span>
                                <span class="course-avg-value">{course.courseAverage}%</span>
                                <span class="app-badge">{course.courseGrade}</span>
                            </div>
                        </div>

                        <!-- Assessment Table -->
                        <table class="app-table">
                            <thead>
                                <tr>
                                    <th>Assessment</th>
                                    <th>Type</th>
                                    <th>Date</th>
                                    <th>Marks</th>
                                    <th>Weightage</th>
                                    <th>Percentage</th>
                                    <th>Grade</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={course.assessments} for:item="assessment">
                                    <tr key={assessment.assessmentName}>
                                        <td>{assessment.assessmentName}</td>
                                        <td>
                                            <span class="type-badge">
                                                {assessment.assessmentType}
                                            </span>
                                        </td>
                                        <td>{assessment.assessmentDate}</td>
                                        <td>
                                            {assessment.marksObtained} / {assessment.maximumMarks}
                                        </td>
                                        <td>{assessment.weightage}%</td>
                                        <td>
                                            <div class="progress-bar-inline">
                                                <div class="app-progress-track">
                                                    <div class="app-progress-fill" style={assessment.progressStyle}>
                                                    </div>
                                                </div>
                                                <span class="progress-label">
                                                    {assessment.percentage}%
                                                </span>
                                            </div>
                                        </td>
                                        <td>
                                            <span class="app-badge">{assessment.grade}</span>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>

                        <!-- Remarks -->
                        <template for:each={course.assessments} for:item="assessment">
                            <template if:true={assessment.hasRemarks}>
                                <div key={assessment.assessmentName} class="remarks-row">
                                    <span class="remarks-label">{assessment.assessmentName}:</span>
                                    <span class="remarks-text">{assessment.remarks}</span>
                                </div>
                            </template>
                        </template>

                    </div>
                </template>

            </div>
        </template>

    </lightning-card>
</template>
